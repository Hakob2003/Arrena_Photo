version: "1"

# 1. База данных PostgreSQL (Управляемая Render)
databases:
  - name: ai-studio-db
    databaseName: aistudio
    user: studio
    plan: free

services:
  # 2. Redis (Поднимаем через Docker-образ как приватный сервис)
  - type: pserv
    name: ai-studio-redis
    env: image
    plan: free
    image:
      url: redis:7-alpine

  # 3. Backend API (Web Service)
  - type: web
    name: ai-studio-backend
    env: node
    plan: free
    buildCommand: "npm install && npm run db:generate && npm run build"
    startCommand: "npm run db:push && cd apps/backend-api && npm run start:prod"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-studio-db
          property: connectionString
      - key: REDIS_HOST
        value: "ai-studio-redis"
      - key: REDIS_PORT
        value: "6379"

  # 4. Фоновый Worker (Background Service)
  - type: worker
    name: ai-studio-worker
    env: node
    plan: free
    buildCommand: "npm install && npm run db:generate && npm run build"
    startCommand: "cd apps/worker && npm run start:prod"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-studio-db
          property: connectionString
      - key: REDIS_HOST
        value: "ai-studio-redis"
      - key: REDIS_PORT
        value: "6379"

  # 5. Frontend (Next.js)
  - type: web
    name: ai-studio-frontend
    env: node
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "cd apps/frontend && npm start"
    envVars:
      # Render автоматически сгенерирует URL бэкенда и подставит сюда
      - key: NEXT_PUBLIC_API_URL
        value: "https://ai-studio-backend.onrender.com/api"
