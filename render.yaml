version: "1"

# 1. База данных PostgreSQL (Управляемая Render)
databases:
  - name: arrena-photo-db
    databaseName: aistudio
    user: studio
    plan: free

services:
  # 2. Redis (Поднимаем через Docker-образ как приватный сервис)
  - type: pserv
    name: arrena-photo-redis
    env: image
    plan: free
    image:
      url: redis:7-alpine

  # 3. Backend API (Web Service)
  - type: web
    name: arrena-photo-backend
    env: node
    plan: free
    buildCommand: "pnpm install && pnpm run db:generate && pnpm run build"
    startCommand: "pnpm run db:push && cd apps/backend-api && pnpm run start:prod"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arrena-photo-db
          property: connectionString
      - key: REDIS_HOST
        value: "arrena-photo-redis"
      - key: REDIS_PORT
        value: "6379"

  # 4. Фоновый Worker (Background Service)
  - type: worker
    name: arrena-photo-worker
    env: node
    plan: free
    buildCommand: "pnpm install && pnpm run db:generate && pnpm run build"
    startCommand: "cd apps/worker && pnpm run start:prod"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arrena-photo-db
          property: connectionString
      - key: REDIS_HOST
        value: "arrena-photo-redis"
      - key: REDIS_PORT
        value: "6379"

  # 5. Frontend (Next.js)
  - type: web
    name: arrena-photo-frontend
    env: node
    plan: free
    buildCommand: "pnpm install && cd apps/frontend && npm run build"
    startCommand: "cd apps/frontend && npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://arrena-photo-backend.onrender.com/v1"
