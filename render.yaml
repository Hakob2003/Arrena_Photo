version: "1"

# 1. База данных PostgreSQL (Управляемая Render)
databases:
  - name: arrena-photo-db
    databaseName: aistudio
    user: studio
    plan: free

services:
  # 2. Redis (Встроенный Managed Redis / Valkey на Render)
  - type: redis # or keyvalue
    name: arrena-photo-redis
    plan: free

  # 3. Backend API (Web Service)
  - type: web
    name: arrena-photo-backend
    env: node
    plan: free
    buildCommand: "pnpm install && pnpm run db:generate && pnpm run build"
    startCommand: "pnpm run db:push && cd apps/backend-api && pnpm run start:prod"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arrena-photo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: arrena-photo-redis
          property: connectionString

  # 4. Frontend (Next.js)
  - type: web
    name: arrena-photo-frontend
    env: node
    plan: free
    buildCommand: "pnpm install && cd apps/frontend && npm run build"
    startCommand: "cd apps/frontend && npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://arrena-photo-backend.onrender.com/v1"
