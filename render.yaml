services:
  - type: web
    name: ai-studio-backend
    env: node
    region: frankfurt
    buildCommand: |
      npm ci
      cd packages/database && npx prisma generate
      cd ../../apps/backend-api && npm run build
    startCommand: "cd apps/backend-api && node dist/main.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_PUBLIC_URL
        sync: false
