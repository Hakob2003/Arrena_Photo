version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ai-studio-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ai-studio-prod-network
    restart: always

  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.prod
    container_name: ai-studio-frontend
    environment:
      - NEXT_PUBLIC_API_URL=https://${DOMAIN}/api
      - NEXT_PUBLIC_WS_URL=https://${DOMAIN}
    expose:
      - "3000"
    restart: always
    networks:
      - ai-studio-prod-network

  # Backend API + Worker
  backend:
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile.prod
    container_name: ai-studio-backend
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=https://${DOMAIN}
      - STORAGE_ENDPOINT=http://minio:9000
      - STORAGE_ACCESS_KEY=${MINIO_USER}
      - STORAGE_SECRET_KEY=${MINIO_PASSWORD}
      - STORAGE_BUCKET=ai-studio
      - STORAGE_PUBLIC_URL=https://${DOMAIN}/storage/ai-studio
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - ai-studio-prod-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ai-studio-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ai-studio-prod-network

  # Redis for BullMQ Queue
  redis:
    image: redis:7-alpine
    container_name: ai-studio-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ai-studio-prod-network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: ai-studio-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_prod_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - ai-studio-prod-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-studio-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    restart: always
    networks:
      - ai-studio-prod-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: ai-studio-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - prometheus
    restart: always
    networks:
      - ai-studio-prod-network

volumes:
  postgres_prod_data:
  redis_prod_data:
  minio_prod_data:
  prometheus_data:
  grafana_data:

networks:
  ai-studio-prod-network:
    driver: bridge
