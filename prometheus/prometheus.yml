global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend_api'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['backend:4000']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
