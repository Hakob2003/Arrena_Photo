packages:
  - 'apps/frontend'
  - 'apps/backend-api'
  - 'packages/*'
allowBuilds:
  '0': '@nestjs/core'
  '1': '@prisma/client'
  '2': '@prisma/engines'
  '3': bcrypt
  '4': msgpackr-extract
  '5': prisma
  '6': sharp
  unrs-resolver: set this to true or false
minimumReleaseAgeExclude:
  - eslint@10.6.0
  - prettier@3.8.5
