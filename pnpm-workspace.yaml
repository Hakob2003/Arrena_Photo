packages:
  - 'apps/frontend'
  - 'apps/backend-api'
  - 'apps/worker'
  - 'packages/*'
allowBuilds:
  '0': '@nestjs/core'
  '1': '@prisma/client'
  '2': '@prisma/engines'
  '3': bcrypt
  '4': msgpackr-extract
  '5': prisma
  '6': sharp
