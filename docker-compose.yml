version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: arrena-postgres
    environment:
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio_password
      POSTGRES_DB: aistudio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio -d aistudio"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arrena-network

  # Redis for BullMQ and Caching
  redis:
    image: redis:7-alpine
    container_name: arrena-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arrena-network

  # MinIO for local S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: arrena-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arrena-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  arrena-network:
    driver: bridge
