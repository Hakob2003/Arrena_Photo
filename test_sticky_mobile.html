<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; display: flex; height: 100vh; flex-direction: column; }
  .main { flex: 1; overflow-y: auto; background: #eee; }
  .wrapper { padding-bottom: 40px; }
  .flex-container { display: flex; flex-direction: column; gap: 32px; padding: 32px; background: white;}
  .nav { position: sticky; top: 64px; align-self: flex-start; height: 60px; width: 100%; background: blue; color: white; padding: 20px;}
  .content { flex: 1; height: 2000px; background: lightgreen; }
</style>
</head>
<body>
  <div class="main">
    <div class="wrapper">
      <div class="flex-container">
        <nav class="nav">Sticky Nav</nav>
        <div class="content">Content</div>
      </div>
    </div>
  </div>
</body>
</html>
